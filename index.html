    async function uploadToImageKit(file) {
      try {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("fileName", `renteasy_${Date.now()}_${file.name}`);
        formData.append("publicKey", IMAGEKIT_PUBLIC_KEY);
        const res  = await fetch("https://upload.imagekit.io/api/v1/files/upload", { method: "POST", body: formData });
        const data = await res.json();
        return data.url || URL.createObjectURL(file);
      } catch { return URL.createObjectURL(file); }
    }

    function PhotoUploader({ photos, setPhotos }) {
      const [uploading, setUploading] = useState(false);
      const [dragOver, setDragOver]   = useState(false);
      const inputRef = useRef();
      const handleFiles = async (files) => {
        const arr = Array.from(files).slice(0, 8 - photos.length);
        if (!arr.length) return;
        setUploading(true);
        const urls = await Promise.all(arr.map(uploadToImageKit));
        setPhotos(p => [...p, ...urls]);
        setUploading(false);
      };
      return (
        <div>
          <label style={{ fontSize:12, color:"#8899AA", display:"block", marginBottom:8 }}>📸 Property Photos (up to 8)</label>
          <div onClick={() => inputRef.current.click()}
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={e => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}
            style={{ border:`2px dashed ${dragOver?"#F4A228":"#1E3A5F"}`, borderRadius:12, padding:"24px 16px", textAlign:"center", cursor:"pointer", background:dragOver?"rgba(244,162,40,0.05)":"#081422", transition:"all 0.2s" }}>
            <input ref={inputRef} type="file" accept="image/*" multiple style={{ display:"none" }} onChange={e => handleFiles(e.target.files)} />
            <div style={{ fontSize:28, marginBottom:8 }}>📷</div>
            <p style={{ color:"#8899AA", fontSize:13 }}>Drag & drop or <span style={{ color:"#F4A228", fontWeight:600 }}>browse</span></p>
            <p style={{ color:"#4a6070", fontSize:11, marginTop:4 }}>JPG, PNG · Max 8 photos</p>
          </div>
          {uploading && <div style={{ marginTop:10, fontSize:13, color:"#2DD4BF", display:"flex", alignItems:"center", gap:8 }}><span style={{ display:"inline-block", width:14, height:14, border:"2px solid #1E3A5F", borderTopColor:"#2DD4BF", borderRadius:"50%", animation:"spin 0.7s linear infinite" }}/> Uploading…</div>}
          {photos.length > 0 && (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(80px,1fr))", gap:8, marginTop:12 }}>
              {photos.map((url,i) => (
                <div key={i} style={{ position:"relative", aspectRatio:"1", borderRadius:8, overflow:"hidden" }}>
                  <img src={url} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                  <button onClick={() => setPhotos(p => p.filter((_,j)=>j!==i))}
                    style={{ position:"absolute", top:3, right:3, background:"rgba(0,0,0,0.65)", color:"#fff", border:"none", borderRadius:"50%", width:20, height:20, fontSize:10, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

                <img src={p.photos[0]} alt={p.title} style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                {p.photos.length>1&&<span style={{ position:"absolute", bottom:6, right:8, background:"rgba(0,0,0,0.6)", color:"#fff", fontSize:11, padding:"2px 8px", borderRadius:12 }}>📷 {p.photos.length}</span>}

            <span className="badge" style={{ position:"absolute", top:10, right:10, background:p.status==="active"?"#22C55E":"#6B7280", color:"#fff" }}>{p.status==="active"?"Available":"Taken"}</span>
            <button onClick={e=>{ e.stopPropagation(); onSave(); }} style={{ position:"absolute", top:8, left:10, background:"rgba(0,0,0,0.35)", border:"none", borderRadius:"50%", width:34, height:34, cursor:"pointer", fontSize:17 }}>
              {saved?"❤️":"🤍"}
            </button>

            <h3 style={{ color:"#F0F4F8", fontSize:15, fontWeight:700, marginBottom:4 }}>{p.title}</h3>
            <p style={{ color:"#8899AA", fontSize:13, marginBottom:10 }}>📍 {p.location}</p>
            <div style={{ marginBottom:12 }}>
              <span className="tag">🛏 {p.bedrooms} bed</span>
              <span className="tag">🚿 {p.bathrooms} bath</span>
              <span className="tag">{p.type}</span>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <span style={{ fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:700, color:"#F4A228" }}>${p.price}</span>
                <span style={{ color:"#8899AA", fontSize:12 }}>/mo</span>
              </div>
              <button className="btn-primary" style={{ padding:"8px 18px" }} onClick={onClick}>Details</button>
            </div>
          </div>
        </div>
      );

        <div style={{ minHeight:"100vh", background:"#0D1B2A", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>

    function AdminPanel({ properties, setProperties, notify, goTo }) {
      const [adminLoggedIn, setAdminLoggedIn] = useState(false);
      const [filterStatus, setFilterStatus]   = useState("all");
      const [editTarget, setEditTarget]       = useState(null);
      const [confirmData, setConfirmData]     = useState(null);
      const [search, setSearch]               = useState("");

      if (!adminLoggedIn) return <AdminLogin onLogin={()=>setAdminLoggedIn(true)}/>;

      const counts = {
        all: properties.length,
        active: properties.filter(p=>p.status==="active").length,
        hidden: properties.filter(p=>p.status==="hidden").length,
        pending: properties.filter(p=>p.status==="pending").length,
        sample: properties.filter(p=>p.isSample).length,
      };

      const displayed = properties.filter(p=>{
        const matchStatus = filterStatus==="all" || p.status===filterStatus || (filterStatus==="sample"&&p.isSample);
        const matchSearch = !search || p.title.toLowerCase().includes(search.toLowerCase()) || p.location.toLowerCase().includes(search.toLowerCase());
        return matchStatus && matchSearch;
      });

      const updateStatus = (id, newStatus) => {
        setProperties(prev=>prev.map(p=>p.id===id?{...p,status:newStatus}:p));
        notify(`Listing ${newStatus==="active"?"approved & visible":newStatus==="hidden"?"hidden from public":"updated"}.`);
      };

      const deleteProp = (id) => {
        setProperties(prev=>prev.filter(p=>p.id!==id));
        notify("Listing deleted permanently.");
        setConfirmData(null);
      };

      const deleteAllSamples = () => {
        setProperties(prev=>prev.filter(p=>!p.isSample));
        notify(`All ${counts.sample} sample listings removed.`);
        setConfirmData(null);
      };

      const saveEdit = (id, form) => {
        setProperties(prev=>prev.map(p=>p.id===id?{
          ...p, title:form.title, location:form.location, city:form.city, price:Number(form.price),
          type:form.type, bedrooms:Number(form.bedrooms), bathrooms:Number(form.bathrooms),
          description:form.description, viewingFee:Number(form.viewingFee),
          amenities:form.amenities.split(",").map(a=>a.trim()).filter(Boolean),
          landlord:{ ...p.landlord, name:form.landlordName, phone:form.landlordPhone, email:form.landlordEmail,
            initials:form.landlordName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase() },
        }:p));
        notify("Listing updated successfully.");
        setEditTarget(null);
      };

      const statusColor = { active:"#22C55E", hidden:"#6B7280", pending:"#F59E0B" };
      const statusLabel = { active:"Active", hidden:"Hidden", pending:"Pending" };

      return (
        <div style={{ minHeight:"100vh", background:"#0D1B2A" }}>
          <Nav page="admin" goTo={goTo} saved={0} mobileMenuOpen={false} setMobileMenuOpen={()=>{}}/>
          <div style={{ padding:"32px 24px", maxWidth:1000, margin:"0 auto" }}>
            <div className="fade-up" style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:28, flexWrap:"wrap", gap:16 }}>
              <div>
                <h1 className="section-title">🔐 Admin Panel</h1>
                <p style={{ color:"#8899AA" }}>Manage all listings on RentEasy Zimbabwe</p>
              </div>
              <button className="btn-danger" style={{ padding:"10px 20px" }} onClick={()=>setAdminLoggedIn(false)}>🚪 Logout</button>
            </div>
            <div className="fade-up-1" style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))", gap:14, marginBottom:24 }}>
              {[["📋",counts.all,"Total"],["✅",counts.active,"Active"],["👁️‍🗨️",counts.hidden,"Hidden"],["⏳",counts.pending,"Pending"],["🧪",counts.sample,"Sample"]].map(([icon,val,lbl])=>(
                <div key={lbl} className="stat-card" style={{ cursor:"pointer", border:filterStatus===lbl.toLowerCase()?"1px solid #F4A228":"1px solid #1E3A5F" }}
                  onClick={()=>setFilterStatus(lbl.toLowerCase()==="total"?"all":lbl.toLowerCase())}>
                  <div style={{ fontSize:24, marginBottom:4 }}>{icon}</div>
                  <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22, color:"#F4A228", fontWeight:700 }}>{val}</div>
                  <div style={{ fontSize:12, color:"#8899AA" }}>{lbl}</div>
                </div>
              ))}
            </div>
            {counts.sample > 0 && (
              <div className="fade-up-1" style={{ background:"rgba(239,68,68,0.08)", border:"1.5px solid rgba(239,68,68,0.4)", borderRadius:14, padding:"16px 20px", marginBottom:24, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12 }}>
                <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                  <span style={{ fontSize:26 }}>⚠️</span>
                  <div>
                    <p style={{ color:"#FCA5A5", fontWeight:700, margin:"0 0 2px" }}>{counts.sample} Sample Listings Are Live</p>
                    <p style={{ color:"#8899AA", fontSize:13, margin:0 }}>These are dummy listings visible to the public. Remove them and replace with real properties.</p>
                  </div>
                </div>
                <button className="btn-danger" onClick={()=>setConfirmData({ type:"deleteAll", msg:`Delete all ${counts.sample} sample listings permanently? This cannot be undone.` })}>
                  🗑️ Remove All Samples
                </button>
              </div>
            )}
            <div className="fade-up-2" style={{ display:"flex", gap:12, marginBottom:20, flexWrap:"wrap" }}>
              <div style={{ flex:1, minWidth:200 }}>
                <input placeholder="🔍 Search listings..." value={search} onChange={e=>setSearch(e.target.value)}/>
              </div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {[["All","all"],["Active","active"],["Hidden","hidden"],["Pending","pending"],["Samples","sample"]].map(([lbl,val])=>(
                  <button key={val} onClick={()=>setFilterStatus(val)}
                    style={{ background:filterStatus===val?"#F4A228":"transparent", color:filterStatus===val?"#0D1B2A":"#8899AA", border:`1.5px solid ${filterStatus===val?"#F4A228":"#1E3A5F"}`, borderRadius:8, padding:"8px 14px", cursor:"pointer", fontSize:13, fontWeight:filterStatus===val?700:500, fontFamily:"'DM Sans',sans-serif" }}>
                    {lbl}
                  </button>
                ))}
              </div>
            </div>
            <div className="fade-up-2" style={{ display:"grid", gap:12 }}>
              {displayed.length === 0 && (
                <div style={{ background:"#112236", border:"2px dashed #1E3A5F", borderRadius:16, padding:"48px 24px", textAlign:"center" }}>
                  <div style={{ fontSize:40, marginBottom:12 }}>📭</div>
                  <p style={{ color:"#8899AA" }}>No listings match your filter.</p>
                </div>
              )}
              {displayed.map(p=>(
                <div key={p.id} className={`admin-row ${p.status==="hidden"?"hidden-listing":""} ${p.status==="pending"?"pending-listing":""}`}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:14 }}>
                    <div style={{ display:"flex", gap:14, alignItems:"center", flex:1, minWidth:200 }}>
                      {p.photos&&p.photos.length>0 ? (
                        <img src={p.photos[0]} alt="" style={{ width:52, height:52, borderRadius:10, objectFit:"cover", flexShrink:0 }}/>
                      ) : (
                        <div style={{ width:52, height:52, borderRadius:10, background:"#1a3a5c", display:"flex", alignItems:"center", justifyContent:"center", fontSize:26, flexShrink:0 }}>{p.emoji}</div>
                      )}
                      <div>
                        <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:4 }}>
                          <span style={{ fontWeight:700, color:"#F0F4F8", fontSize:15 }}>{p.title}</span>
                          {p.isSample && <span className="badge" style={{ background:"rgba(239,68,68,0.2)", color:"#FCA5A5", border:"1px solid rgba(239,68,68,0.3)" }}>🧪 Sample</span>}
                        </div>
                        <div style={{ color:"#8899AA", fontSize:13 }}>📍 {p.location} · {p.type} · <span style={{ color:"#F4A228", fontWeight:700 }}>${p.price}/mo</span></div>
                        <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:4 }}>
                          <span className="status-dot" style={{ background:statusColor[p.status]||"#6B7280" }}></span>
                          <span style={{ fontSize:12, color:statusColor[p.status]||"#6B7280", fontWeight:600 }}>{statusLabel[p.status]||p.status}</span>
                          <span style={{ color:"#4a6070", fontSize:12, marginLeft:4 }}>· {p.posted}</span>
                        </div>
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
                      {p.status !== "active" && (
                        <button className="btn-success" onClick={()=>updateStatus(p.id,"active")}>✅ Approve</button>
                      )}
                      {p.status === "active" && (
                        <button className="btn-warning" onClick={()=>updateStatus(p.id,"hidden")}>🙈 Hide</button>
                      )}
                      {p.status === "hidden" && (
                        <button className="btn-teal" style={{ padding:"9px 18px", fontSize:13 }} onClick={()=>updateStatus(p.id,"active")}>👁️ Show</button>
                      )}
                      <button className="btn-ghost" style={{ padding:"9px 14px", fontSize:13 }} onClick={()=>setEditTarget(p)}>✏️ Edit</button>
                      <button className="btn-danger" onClick={()=>setConfirmData({ type:"single", id:p.id, msg:`Delete "${p.title}" permanently? This cannot be undone.` })}>🗑️ Delete</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div className="fade-up-3" style={{ marginTop:32, background:"#081422", border:"1px solid #1E3A5F", borderRadius:14, padding:"20px 24px" }}>
              <h3 style={{ color:"#2DD4BF", fontWeight:700, marginBottom:12, fontSize:14 }}>📖 Admin Guide</h3>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:12 }}>
                {[["✅ Approve","Makes a listing visible to the public on the browse page."],["🙈 Hide","Removes a listing from public view without deleting it."],["✏️ Edit","Update any details: price, photos, contact info, amenities."],["🗑️ Delete","Permanently removes a listing. Cannot be undone."],["🧪 Sample","Dummy listings pre-loaded into the site. Remove these first!"],["⏳ Pending","New listings submitted by landlords awaiting your approval."]].map(([lbl,desc])=>(
                  <div key={lbl} style={{ background:"#112236", borderRadius:10, padding:"12px 14px" }}>
                    <div style={{ fontWeight:700, color:"#F4A228", fontSize:13, marginBottom:4 }}>{lbl}</div>
                    <div style={{ color:"#8899AA", fontSize:12, lineHeight:1.5 }}>{desc}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          {editTarget && <EditModal prop={editTarget} onSave={(form)=>saveEdit(editTarget.id,form)} onClose={()=>setEditTarget(null)}/>}
          {confirmData && (
            <ConfirmDialog message={confirmData.msg} dangerous={true}
              onConfirm={()=>{ confirmData.type==="deleteAll"?deleteAllSamples():deleteProp(confirmData.id); }}
              onCancel={()=>setConfirmData(null)}/>
          )}
        </div>
      );
    }

    function App() {
      const [page, setPage]                     = useState("home");
      const [selectedProperty, setSelectedProp] = useState(null);
      const [searchTerm, setSearchTerm]         = useState("");
      const [filterType, setFilterType]         = useState("All");
      const [filterCity, setFilterCity]         = useState("All");
      const [filterMax, setFilterMax]           = useState(1500);
      const [filterBeds, setFilterBeds]         = useState("Any");
      const [paidProperties, setPaid]           = useState([]);
      const [savedProperties, setSaved]         = useState([]);
      const [payModal, setPayModal]             = useState(false);
      const [listingModal, setListingModal]     = useState(false);
      const [properties, setProperties]         = useState(INITIAL_PROPERTIES);
      const [notification, setNotif]            = useState(null);
      const [mobileMenuOpen, setMobileMenu]     = useState(false);
      const [newPhotos, setNewPhotos]           = useState([]);
      const [newListing, setNewListing]         = useState({ title:"", location:"", city:"Harare", price:"", type:"House", bedrooms:"", bathrooms:"", description:"", amenities:"" });

      const notify = (msg, type="success") => { setNotif({ msg, type }); setTimeout(()=>setNotif(null),3500); };
      const goTo = (p) => { setPage(p); setMobileMenu(false); window.scrollTo(0,0); };

      const visibleProperties = properties.filter(p => p.status === "active");

      const filtered = visibleProperties.filter(p => {
        const s = searchTerm.toLowerCase();
        return (!s || p.title.toLowerCase().includes(s) || p.location.toLowerCase().includes(s) || p.city.toLowerCase().includes(s))
          && (filterType==="All" || p.type===filterType)
          && (filterCity==="All" || p.city===filterCity)
          && p.price <= filterMax
          && (filterBeds==="Any" || p.bedrooms >= parseInt(filterBeds));
      });

      const handlePay = (payerNumber) => {
        setPayModal(false);
        notify(`✅ Payment confirmed! Landlord contact unlocked. We'll verify your EcoCash payment from ${payerNumber||"your number"}.`);
        setPaid(prev => [...prev, selectedProperty.id]);
      };

      const handleListingSubmit = () => {
        if (!newListing.title||!newListing.location||!newListing.price) { notify("Please fill in all required fields.","error"); return; }
        const newProp = {
          ...newListing, id:Date.now(), status:"pending", isSample:false, emoji:"🏠", posted:"Just now", viewingFee:5,
          photos:newPhotos, price:Number(newListing.price), bedrooms:Number(newListing.bedrooms)||1, bathrooms:Number(newListing.bathrooms)||1,
          landlord:{ name:"Pending Verification", initials:"PV", phone:"Hidden until approved", email:"Hidden until approved", rating:5.0, properties:1 },
          amenities:newListing.amenities.split(",").map(a=>a.trim()).filter(Boolean)
        };
        setProperties(prev=>[...prev, newProp]);
        setListingModal(false); setNewPhotos([]);
        setNewListing({ title:"", location:"", city:"Harare", price:"", type:"House", bedrooms:"", bathrooms:"", description:"", amenities:"" });
        notify("🎉 Property submitted! It will appear once approved by admin.");
      };

      if (page === "admin") return (
        <AdminPanel properties={properties} setProperties={setProperties} notify={notify} goTo={goTo}/>
      );

      if (page==="home") return (
        <div style={{ minHeight:"100vh", background:"#0D1B2A" }}>
          {notification && <Notification data={notification}/>}
          <Nav page={page} goTo={goTo} saved={savedProperties.length} mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenu}/>
          <div style={{ background:"linear-gradient(160deg,#0D1B2A 0%,#1a3a5c 45%,#0D1B2A 100%)", padding:"80px 24px 60px", textAlign:"center", borderBottom:"1px solid #1E3A5F", position:"relative", overflow:"hidden" }}>
            <div className="fade-up" style={{ fontSize:56, marginBottom:16 }}>🏡</div>
            <h1 className="fade-up-1" style={{ fontFamily:"'Playfair Display',serif", fontSize:"clamp(32px,6vw,52px)", fontWeight:800, color:"#F4A228", lineHeight:1.15, marginBottom:14 }}>Find Your Perfect Home<br/>in Zimbabwe</h1>
            <p className="fade-up-2" style={{ color:"#8899AA", fontSize:17, maxWidth:520, margin:"0 auto 40px" }}>Connecting landlords and tenants across Zimbabwe. List for free. Pay a small fee to connect.</p>
            <div className="fade-up-3" style={{ display:"flex", gap:16, justifyContent:"center", flexWrap:"wrap", marginBottom:56 }}>
              <button className="btn-primary" onClick={() => goTo("listings")} style={{ fontSize:16, padding:"14px 32px" }}>🔍 Browse Properties</button>
              <button className="btn-teal" onClick={() => goTo("landlord")} style={{ fontSize:16, padding:"14px 32px" }}>🏠 List Your Property</button>
            </div>
            <div className="fade-up-4" style={{ display:"flex", justifyContent:"center", gap:"clamp(20px,5vw,56px)", flexWrap:"wrap" }}>
              {[["🏘️","50+","Properties"],["👥","200+","Tenants"],["⭐","4.8","Rating"],["🇿🇼","5","Cities"]].map(([icon,val,label]) => (
                <div key={label} style={{ textAlign:"center" }}>
                  <div style={{ fontSize:22 }}>{icon}</div>
                  <div style={{ fontFamily:"'Playfair Display',serif", fontSize:26, fontWeight:700, color:"#F4A228" }}>{val}</div>
                  <div style={{ fontSize:12, color:"#8899AA" }}>{label}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ padding:"60px 24px", maxWidth:900, margin:"0 auto" }}>
            <h2 style={{ fontFamily:"'Playfair Display',serif", textAlign:"center", color:"#F0F4F8", fontSize:30, marginBottom:8 }}>How RentEasy Works</h2>
            <p style={{ textAlign:"center", color:"#8899AA", marginBottom:40 }}>Simple. Transparent. Affordable.</p>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))", gap:20 }}>
              {[["1","🏠","Landlord Lists","Post your property for free in minutes. Add photos, price and amenities."],["2","🔍","Tenant Browses","Search by city, price, bedrooms. Filter to find exactly what you need."],["3","📱","Pay via EcoCash",`Send the viewing fee to ${ECOCASH_NUMBER} via EcoCash to unlock contact details.`],["4","🤝","Connect & Move In","Contact the landlord directly. Arrange a viewing. Secure your new home!"]].map(([num,icon,title,desc]) => (
                <div key={num} style={{ background:"#112236", border:"1px solid #1E3A5F", borderRadius:16, padding:"28px 22px", textAlign:"center", transition:"border-color 0.2s" }}
                  onMouseEnter={e=>e.currentTarget.style.borderColor="#F4A228"} onMouseLeave={e=>e.currentTarget.style.borderColor="#1E3A5F"}>
                  <div style={{ background:"#F4A228", color:"#0D1B2A", borderRadius:"50%", width:32, height:32, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:14, margin:"0 auto 12px" }}>{num}</div>
                  <div style={{ fontSize:36, marginBottom:10 }}>{icon}</div>
                  <h3 style={{ color:"#F4A228", fontWeight:700, marginBottom:8 }}>{title}</h3>
                  <p style={{ color:"#8899AA", fontSize:13, lineHeight:1.6 }}>{desc}</p>
                </div>
              ))}
            </div>
          </div>
          <div style={{ padding:"0 24px 60px", maxWidth:900, margin:"0 auto" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
              <h2 style={{ fontFamily:"'Playfair Display',serif", color:"#F0F4F8", fontSize:26 }}>Featured Properties</h2>
              <button className="btn-outline" onClick={() => goTo("listings")}>View All →</button>
            </div>
            {visibleProperties.length === 0 ? (
              <div style={{ background:"#112236", border:"2px dashed #1E3A5F", borderRadius:16, padding:"48px 24px", textAlign:"center" }}>
                <div style={{ fontSize:48, marginBottom:12 }}>🏠</div>
                <p style={{ color:"#8899AA" }}>No properties listed yet. Be the first to post a listing!</p>
                <button className="btn-primary" style={{ marginTop:16 }} onClick={()=>goTo("landlord")}>List a Property</button>
              </div>
            ) : (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:18 }}>
                {visibleProperties.slice(0,3).map(p => (
                  <PropertyCard key={p.id} property={p} saved={savedProperties.includes(p.id)}
                    onSave={() => setSaved(prev=>prev.includes(p.id)?prev.filter(x=>x!==p.id):[...prev,p.id])}
                    onClick={() => { setSelectedProp(p); goTo("detail"); }}/>
                ))}
              </div>
            )}
          </div>
          <Footer goTo={goTo}/>
        </div>
      );

      if (page==="listings") return (
        <div style={{ minHeight:"100vh", background:"#0D1B2A" }}>
          {notification && <Notification data={notification}/>}
          <Nav page={page} goTo={goTo} saved={savedProperties.length} mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenu}/>
          <div style={{ padding:"32px 24px", maxWidth:1100, margin:"0 auto" }}>
            <div className="fade-up" style={{ marginBottom:24 }}>
              <h1 className="section-title">Browse Properties</h1>
              <p style={{ color:"#8899AA", fontSize:14 }}>Find your next home across Zimbabwe</p>
            </div>
            <div className="fade-up-1" style={{ background:"#112236", border:"1px solid #1E3A5F", borderRadius:16, padding:"20px 24px", marginBottom:28 }}>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))", gap:14 }}>
                <div style={{ gridColumn:"1 / -1" }}>
                  <label style={{ fontSize:12, color:"#8899AA", display:"block", marginBottom:5 }}>🔍 Search</label>
                  <input placeholder="Location, city, or property name..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                </div>
                <div>
                  <label style={{ fontSize:12, color:"#8899AA", display:"block", marginBottom:5 }}>City</label>
                  <select value={filterCity} onChange={e=>setFilterCity(e.target.value)}>{["All","Harare","Bulawayo","Mutare","Gweru"].map(c=><option key={c}>{c}</option>)}</select>
                </div>
                <div>
                  <label style={{ fontSize:12, color:"#8899AA", display:"block", marginBottom:5 }}>Type</label>
                  <select value={filterType} onChange={e=>setFilterType(e.target.value)}>{["All","House","Flat","Townhouse","Studio"].map(t=><option key={t}>{t}</option>)}</select>
                </div>
                <div>
                  <label style={{ fontSize:12, color:"#8899AA", display:"block", marginBottom:5 }}>Min Bedrooms</label>
                  <select value={filterBeds} onChange={e=>setFilterBeds(e.target.value)}>{["Any","1","2","3","4"].map(b=><option key={b}>{b}</option>)}</select>
                </div>
                <div>
                  <label style={{ fontSize:12, color:"#8899AA", display:"block", marginBottom:5 }}>Max Rent: <strong style={{ color:"#F4A228" }}>${filterMax}/mo</strong></label>
                  <input type="range" min={100} max={1500} step={50} value={filterMax} onChange={e=>setFilterMax(Number(e.target.value))} style={{ background:"transparent", border:"none", padding:"8px 0", accentColor:"#F4A228" }}/>
                </div>
              </div>
            </div>
            <p style={{ color:"#8899AA", fontSize:13, marginBottom:20 }}>Showing <strong style={{ color:"#F4A228" }}>{filtered.length}</strong> {filtered.length===1?"property":"properties"}</p>
            {filtered.length===0 ? (
              <div style={{ textAlign:"center", padding:"60px 20px" }}>
                <div style={{ fontSize:48, marginBottom:16 }}>🔍</div>
                <p style={{ color:"#8899AA" }}>No properties match your filters. Try adjusting your search.</p>
              </div>
            ) : (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))", gap:22 }}>
                {filtered.map((p,i) => (
                  <div key={p.id} className={`fade-up-${Math.min(i+1,4)}`}>
                    <PropertyCard property={p} saved={savedProperties.includes(p.id)}
                      onSave={() => setSaved(prev=>prev.includes(p.id)?prev.filter(x=>x!==p.id):[...prev,p.id])}
                      onClick={() => { setSelectedProp(p); goTo("detail"); }}/>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );

      if (page==="detail" && selectedProperty) {
        const prop = properties.find(p=>p.id===selectedProperty.id) || selectedProperty;
        const unlocked = paidProperties.includes(prop.id);
        return (
          <div style={{ minHeight:"100vh", background:"#0D1B2A" }}>
            {notification && <Notification data={notification}/>}
            <Nav page="listings" goTo={goTo} saved={savedProperties.length} mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenu}/>
            <div style={{ padding:"28px 24px", maxWidth:760, margin:"0 auto" }}>
              <button className="btn-ghost" onClick={() => goTo("listings")} style={{ marginBottom:22 }}>← Back to listings</button>
              <div className="fade-up" style={{ background:"#112236", border:"1px solid #1E3A5F", borderRadius:20, overflow:"hidden" }}>
                <div style={{ position:"relative" }}>
                  <PhotoGallery photos={prop.photos} emoji={prop.emoji}/>
                  <div style={{ position:"absolute", top:16, right:16 }}>
                    <span className="badge" style={{ background:prop.status==="active"?"#22C55E":"#6B7280", color:"#fff" }}>{prop.status==="active"?"✓ Available":"Taken"}</span>
                  </div>
                  <button onClick={() => setSaved(prev=>prev.includes(prop.id)?prev.filter(x=>x!==prop.id):[...prev,prop.id])}
                    style={{ position:"absolute", top:16, left:16, background:"rgba(0,0,0,0.4)", border:"none", borderRadius:"50%", width:38, height:38, cursor:"pointer", fontSize:20 }}>
                    {savedProperties.includes(prop.id)?"❤️":"🤍"}
                  </button>
                </div>
                <div style={{ padding:"28px 32px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6, flexWrap:"wrap", gap:12 }}>
                    <h1 style={{ fontFamily:"'Playfair Display',serif", color:"#F4A228", fontSize:24 }}>{prop.title}</h1>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontFamily:"'Playfair Display',serif", fontSize:26, fontWeight:700, color:"#F4A228" }}>${prop.price}</div>
                      <div style={{ fontSize:12, color:"#8899AA" }}>per month</div>
                    </div>
                  </div>
                  <p style={{ color:"#8899AA", marginBottom:16 }}>📍 {prop.location} · Posted {prop.posted}</p>
                  <div style={{ display:"flex", gap:14, marginBottom:20, flexWrap:"wrap" }}>
                    {[["🛏",prop.bedrooms,"Beds"],["🚿",prop.bathrooms,"Baths"],["🏠",prop.type,"Type"],["💳",`$${prop.viewingFee}`,"View Fee"]].map(([icon,val,lbl]) => (
                      <div key={lbl} style={{ background:"#081422", borderRadius:12, padding:"12px 16px", textAlign:"center", flex:1, minWidth:70 }}>
                        <div style={{ fontSize:20 }}>{icon}</div>
                        <div style={{ fontWeight:700, color:"#F4A228", fontSize:16 }}>{val}</div>
                        <div style={{ fontSize:11, color:"#8899AA" }}>{lbl}</div>
                      </div>
                    ))}
                  </div>
                  <p style={{ color:"#CBD5E1", lineHeight:1.75, marginBottom:20 }}>{prop.description}</p>
                  <div style={{ marginBottom:24 }}>
                    <h3 style={{ color:"#2DD4BF", fontSize:14, fontWeight:700, marginBottom:10, textTransform:"uppercase", letterSpacing:1 }}>Amenities</h3>
                    <div>{(Array.isArray(prop.amenities)?prop.amenities:[]).map(a=><span key={a} className="tag">✓ {a}</span>)}</div>
                  </div>
                  <div style={{ background:"#081422", border:"1px solid #1E3A5F", borderRadius:14, padding:"18px 20px", marginBottom:24 }}>
                    <h3 style={{ color:"#2DD4BF", fontSize:13, fontWeight:700, marginBottom:14, textTransform:"uppercase", letterSpacing:1 }}>Listed By</h3>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                        <div style={{ background:"#F4A228", color:"#0D1B2A", borderRadius:"50%", width:46, height:46, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:16, flexShrink:0 }}>{prop.landlord.initials}</div>
                        <div>
                          <div style={{ fontWeight:700, color:"#F0F4F8" }}>{prop.landlord.name}</div>
                          <div style={{ color:"#8899AA", fontSize:13 }}>⭐ {prop.landlord.rating} · {prop.landlord.properties} listings</div>
                        </div>
                      </div>
                      {unlocked ? (
                        <div style={{ textAlign:"right" }}>
                          <div style={{ color:"#22C55E", fontWeight:700 }}>📞 {prop.landlord.phone}</div>
                          <div style={{ color:"#2DD4BF", fontSize:13, marginTop:2 }}>📧 {prop.landlord.email}</div>
                        </div>
                      ) : (
                        <div style={{ textAlign:"center" }}>
                          <div style={{ fontSize:22 }}>🔒</div>
                          <div style={{ color:"#8899AA", fontSize:12 }}>Pay to unlock</div>
                        </div>
                      )}
                    </div>
                  </div>
                  {prop.status==="active" && !unlocked && (
                    <div style={{ background:"linear-gradient(135deg,#1a3a5c,#112236)", border:"2px solid #F4A228", borderRadius:16, padding:"24px", textAlign:"center" }}>
                      <h3 style={{ fontFamily:"'Playfair Display',serif", color:"#F4A228", fontSize:20, marginBottom:8 }}>Request a Viewing</h3>
                      <p style={{ color:"#8899AA", fontSize:14, marginBottom:12, lineHeight:1.6 }}>Pay a once-off viewing fee of <strong style={{ color:"#F4A228" }}>${prop.viewingFee} USD</strong> via EcoCash to instantly unlock the landlord's contact details.</p>
                      <div style={{ display:"inline-flex", alignItems:"center", gap:10, background:"rgba(244,162,40,0.08)", border:"1px solid rgba(244,162,40,0.25)", borderRadius:10, padding:"10px 16px", marginBottom:20 }}>
                        <span style={{ fontSize:20 }}>📱</span>
                        <div style={{ textAlign:"left" }}>
                          <p style={{ color:"#8899AA", fontSize:11, margin:0 }}>Send EcoCash to</p>
                          <p style={{ color:"#F4A228", fontWeight:800, fontSize:16, margin:0, letterSpacing:1 }}>{ECOCASH_NUMBER}</p>
                        </div>
                      </div>
                      <br/>
                      <button className="btn-primary" style={{ fontSize:16, padding:"14px 36px" }} onClick={() => setPayModal(true)}>📱 Pay ${prop.viewingFee} via EcoCash →</button>
                      <p style={{ color:"#4a6070", fontSize:11, marginTop:10 }}>🔒 Secure · Instant unlock · EcoCash</p>
                    </div>
                  )}
                  {unlocked && (
                    <div style={{ background:"#071a0e", border:"2px solid #22C55E", borderRadius:16, padding:"24px", textAlign:"center" }}>
                      <div style={{ fontSize:40, marginBottom:8 }}>✅</div>
                      <h3 style={{ color:"#22C55E", fontFamily:"'Playfair Display',serif", fontSize:20, marginBottom:6 }}>Contact Unlocked!</h3>
                      <p style={{ color:"#CBD5E1", fontSize:14, marginBottom:12 }}>Contact <strong>{prop.landlord.name}</strong> directly to arrange your viewing.</p>
                      <div style={{ color:"#F4A228", fontSize:18, fontWeight:700 }}>📞 {prop.landlord.phone}</div>
                      <div style={{ color:"#2DD4BF", fontSize:15, marginTop:6 }}>📧 {prop.landlord.email}</div>
                    </div>
                  )}
                  {prop.status!=="active" && (
                    <div style={{ background:"#1a1a2e", border:"2px solid #6B7280", borderRadius:16, padding:"24px", textAlign:"center" }}>
                      <p style={{ color:"#8899AA" }}>This property is currently not available. Check back later or browse similar listings.</p>
                      <button className="btn-outline" style={{ marginTop:14 }} onClick={() => goTo("listings")}>Browse More →</button>
                    </div>
                  )}
                </div>
              </div>
            </div>
            {payModal && <EcoCashModal prop={prop} onClose={() => setPayModal(false)} onConfirm={handlePay}/>}
          </div>
        );
      }

      if (page==="saved") return (
        <div style={{ minHeight:"100vh", background:"#0D1B2A" }}>
          {notification && <Notification data={notification}/>}
          <Nav page={page} goTo={goTo} saved={savedProperties.length} mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenu}/>
          <div style={{ padding:"32px 24px", maxWidth:1100, margin:"0 auto" }}>
            <h1 className="section-title fade-up">❤️ Saved Properties</h1>
            <p style={{ color:"#8899AA", marginBottom:28 }}>{savedProperties.length} saved</p>
            {savedProperties.length===0 ? (
              <div style={{ background:"#112236", border:"1px solid #1E3A5F", borderRadius:16, padding:"60px 24px", textAlign:"center" }}>
                <div style={{ fontSize:48, marginBottom:12 }}>🤍</div>
                <p style={{ color:"#8899AA", marginBottom:20 }}>No saved properties yet. Browse listings and tap the heart icon.</p>
                <button className="btn-primary" onClick={() => goTo("listings")}>Browse Properties →</button>
              </div>
            ) : (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))", gap:22 }}>
                {visibleProperties.filter(p=>savedProperties.includes(p.id)).map(p => (
                  <PropertyCard key={p.id} property={p} saved={true}
                    onSave={() => setSaved(prev=>prev.filter(x=>x!==p.id))}
                    onClick={() => { setSelectedProp(p); goTo("detail"); }}/>
                ))}
              </div>
            )}
          </div>
        </div>
      );

      if (page==="landlord") return (
        <div style={{ minHeight:"100vh", background:"#0D1B2A" }}>
          {notification && <Notification data={notification}/>}
          <Nav page={page} goTo={goTo} saved={savedProperties.length} mobileMenuOpen={mobileMenuOpen} setMobileMenuOpen={setMobileMenu}/>
          <div style={{ padding:"32px 24px", maxWidth:920, margin:"0 auto" }}>
            <div className="fade-up" style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:28, flexWrap:"wrap", gap:16 }}>
              <div>
                <h1 className="section-title">Landlord Dashboard</h1>
                <p style={{ color:"#8899AA" }}>Submit your property listing for admin approval</p>
              </div>
              <button className="btn-primary" onClick={() => setListingModal(true)}>+ List New Property</button>
            </div>
            <div className="fade-up-1" style={{ background:"linear-gradient(135deg,rgba(244,162,40,0.08),rgba(244,162,40,0.03))", border:"1.5px solid rgba(244,162,40,0.3)", borderRadius:14, padding:"16px 20px", marginBottom:24, display:"flex", alignItems:"center", gap:14 }}>
              <span style={{ fontSize:28 }}>📱</span>
              <div>
                <p style={{ color:"#F4A228", fontWeight:700, margin:"0 0 2px", fontSize:14 }}>Payments received on EcoCash {ECOCASH_NUMBER}</p>
                <p style={{ color:"#8899AA", fontSize:12, margin:0 }}>Viewing fees are collected via EcoCash. Payouts processed within 24 hours.</p>
              </div>
            </div>
            <div className="fade-up-2" style={{ background:"#112236", border:"2px dashed #1E3A5F", borderRadius:16, padding:"48px 24px", textAlign:"center" }}>
              <div style={{ fontSize:40, marginBottom:12 }}>🏠</div>
              <p style={{ color:"#8899AA", marginBottom:8 }}>Submit your property and it will go live once approved by the RentEasy admin.</p>
              <p style={{ color:"#4a6070", fontSize:12, marginBottom:20 }}>Listings are reviewed within 24 hours.</p>
              <button className="btn-primary" onClick={() => setListingModal(true)}>List Your Property</button>
            </div>
          </div>
          {listingModal && (
            <div className="modal-overlay">
              <div className="modal-box" style={{ maxHeight:"90vh", overflowY:"auto" }}>
                <h3 style={{ fontFamily:"'Playfair Display',serif", color:"#F4A228", fontSize:22, marginBottom:20 }}>📋 List a New Property</h3>
                <div style={{ display:"grid", gap:14 }}>
                  {[["Property Title *","title","e.g. Modern 3-Bedroom House"],["Location *","location","e.g. Borrowdale, Harare"],["Monthly Rent (USD) *","price","e.g. 750"],["Bedrooms","bedrooms","e.g. 3"],["Bathrooms","bathrooms","e.g. 2"]].map(([lbl,field,ph]) => (
                    <div key={field}>
                      <label style={{ fontSize:12, color:"#8899AA", display:"block", marginBottom:5 }}>{lbl}</label>
                      <input placeholder={ph} value={newListing[field]} onChange={e=>setNewListing(p=>({...p,[field]:e.target.value}))}/>
                    </div>
                  ))}
                  <div>
                    <label style={{ fontSize:12, color:"#8899AA", display:"block", marginBottom:5 }}>City</label>
                    <select value={newListing.city} onChange={e=>setNewListing(p=>({...p,city:e.target.value}))}>
                      {["Harare","Bulawayo","Mutare","Gweru","Masvingo"].map(c=><option key={c}>{c}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{ fontSize:12, color:"#8899AA", display:"block", marginBottom:5 }}>Property Type</label>
                    <select value={newListing.type} onChange={e=>setNewListing(p=>({...p,type:e.target.value}))}>
                      {["House","Flat","Townhouse","Studio","Commercial"].map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{ fontSize:12, color:"#8899AA", display:"block", marginBottom:5 }}>Description</label>
                    <textarea rows={3} placeholder="Describe the property..." value={newListing.description} onChange={e=>setNewListing(p=>({...p,description:e.target.value}))}/>
                  </div>
                  <div>
                    <label style={{ fontSize:12, color:"#8899AA", display:"block", marginBottom:5 }}>Amenities (comma-separated)</label>
                    <input placeholder="e.g. Borehole, Parking, Security, Garden" value={newListing.amenities} onChange={e=>setNewListing(p=>({...p,amenities:e.target.value}))}/>
                  </div>
                  <PhotoUploader photos={newPhotos} setPhotos={setNewPhotos}/>
                </div>
                <div style={{ display:"flex", gap:12, marginTop:24 }}>
                  <button className="btn-primary" style={{ flex:1, padding:"13px" }} onClick={handleListingSubmit}>Submit for Approval ✓</button>
                  <button className="btn-ghost" onClick={() => { setListingModal(false); setNewPhotos([]); }}>Cancel</button>
                </div>
                <p style={{ color:"#4a6070", fontSize:11, textAlign:"center", marginTop:10 }}>Your listing will be reviewed before going live.</p>
              </div>
            </div>
          )}
        </div>
      );

      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
