<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="RentEasy Zimbabwe - Find rental properties across Zimbabwe. Connect landlords and tenants easily." />
  <meta name="theme-color" content="#0D1B2A" />
  <meta property="og:title" content="RentEasy Zimbabwe" />
  <meta property="og:description" content="Find your perfect home in Zimbabwe. Browse properties, connect with landlords." />
  <title>RentEasy Zimbabwe 🏡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #0D1B2A;
      color: #F0F4F8;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0D1B2A; }
    ::-webkit-scrollbar-thumb { background: #1E3A5F; border-radius: 3px; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .fade-up-1 { animation: fadeUp 0.5s 0.1s ease both; }
    .fade-up-2 { animation: fadeUp 0.5s 0.2s ease both; }
    .fade-up-3 { animation: fadeUp 0.5s 0.3s ease both; }
    .fade-up-4 { animation: fadeUp 0.5s 0.4s ease both; }
    .fade-in { animation: fadeIn 0.4s ease forwards; }

    .property-card {
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
    }
    .property-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(244, 162, 40, 0.18);
    }

    .btn-primary {
      background: #F4A228;
      color: #0D1B2A;
      border: none;
      border-radius: 8px;
      padding: 11px 24px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .btn-primary:hover { background: #e8941a; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-teal {
      background: #2DD4BF;
      color: #0D1B2A;
      border: none;
      border-radius: 8px;
      padding: 11px 24px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-teal:hover { background: #26b8a5; transform: translateY(-1px); }

    .btn-outline {
      background: transparent;
      color: #F4A228;
      border: 1.5px solid #F4A228;
      border-radius: 8px;
      padding: 10px 22px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline:hover { background: rgba(244,162,40,0.1); }

    .btn-ghost {
      background: transparent;
      color: #8899AA;
      border: 1.5px solid #1E3A5F;
      border-radius: 8px;
      padding: 10px 22px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: #F4A228; color: #F4A228; }

    input, select, textarea {
      font-family: 'DM Sans', sans-serif;
      background: #081422;
      border: 1.5px solid #1E3A5F;
      color: #F0F4F8;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: #F4A228; }
    input::placeholder, textarea::placeholder { color: #4a6070; }
    select option { background: #112236; }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      animation: fadeIn 0.2s ease;
    }
    .modal-box {
      background: #112236;
      border: 2px solid #F4A228;
      border-radius: 20px;
      padding: 32px;
      max-width: 500px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      animation: fadeUp 0.3s ease;
    }

    .notification {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      padding: 13px 28px;
      border-radius: 50px;
      font-weight: 600; font-size: 14px;
      z-index: 9999;
      animation: slideDown 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .tag {
      background: #1E3A5F;
      color: #2DD4BF;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      display: inline-block;
      margin: 2px;
      font-weight: 500;
    }

    .badge {
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 700;
      display: inline-block;
    }

    .stat-card {
      background: #112236;
      border: 1px solid #1E3A5F;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: #F4A228; }

    .section-title {
      font-family: 'Playfair Display', serif;
      color: #F4A228;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .modal-box { padding: 22px; }
      .hide-mobile { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="./src/app.js"></script>
</body>
</html>
